name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync
      - run: uv run ruff check
      - run: uv run ruff format --check
      - run: uv run pytest -q  # cov flags + ≥50% gate come from pyproject addopts

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  e2e:
    needs: [backend, frontend]  # only after lint + tests pass
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.2.0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json
      - run: cp .env.example .env
      # QA-03 fixtures are git-ignored binaries — regenerate before the stack boots.
      - run: uv run --no-project --with reportlab --with python-docx python tests/fixtures/generate.py
      - run: docker compose up -d --build
      - name: Wait for stack health
        run: timeout 180 bash -c 'until curl -sf http://localhost:8080/api/v1/health; do sleep 3; done'
      - run: npm ci
        working-directory: e2e
      - run: npx playwright install --with-deps chromium
        working-directory: e2e
      - name: Run E2E critical path against the full stack
        run: E2E_BASE_URL=http://localhost:8080 npx playwright test
        working-directory: e2e
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
      - if: always()
        run: docker compose logs --no-color > docker-logs.txt && docker compose down -v
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: docker-logs.txt

  build-images:
    needs: [backend, frontend, e2e]  # only after lint + tests + e2e pass
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: docker build -t backend ./backend
      - run: docker build -t frontend ./frontend
