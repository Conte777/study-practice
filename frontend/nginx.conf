server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # hashed Vite assets are immutable
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # DO-02: proxy API to backend. Variable + resolver defers DNS to request time
    # so nginx still boots when `app` is absent (standalone image test).
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $backend app;
        proxy_pass http://$backend:8000$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback: unknown routes serve index.html, never 404
    location / {
        try_files $uri $uri/ /index.html;
    }
}
